<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistem Kelulusan - SMPN 2 Pabuaran</title>
    <style>
        /* ====== KODE CSS ANDA MASUK DI SINI ====== */
        body {
            background-color: #EAF0F6;
            font-family: 'Segoe UI', system-ui, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }
        .wadah-aplikasi {
            width: 90%;
            max-width: 380px;
            background: #EAF0F6;
            padding: 40px 30px;
            border-radius: 40px;
            box-shadow: 20px 20px 40px #c2cbd6, -20px -20px 40px #ffffff;
            box-sizing: border-box;
            text-align: center; 
            position: relative;
        }
        .header-aplikasi { margin-bottom: 35px; }
        .logo-toga-embos {
            width: 90px; height: 90px; background: #EAF0F6; border-radius: 50%;
            margin: 0 auto 25px auto; display: flex; justify-content: center;
            align-items: center; font-size: 42px;
            box-shadow: 10px 10px 20px #cbd3dd, -10px -10px 20px #ffffff;
        }
        .header-aplikasi h1 { color: #2D3748; font-size: 20px; margin: 0; font-weight: 800; letter-spacing: 0.5px; }
        .header-aplikasi p { color: #718096; font-size: 13px; margin: 10px 0 0 0; font-weight: 700; letter-spacing: 0.5px; }
        .grup-input { margin-bottom: 25px; }
        .grup-input label { display: block; font-size: 13px; color: #4A5568; font-weight: 600; margin-bottom: 10px; }
        .input-embos {
            width: 100%; background: #EAF0F6; border: none; padding: 15px 20px;
            border-radius: 15px; font-size: 14px; color: #2D3748; font-weight: 600;
            text-align: center; box-shadow: 6px 6px 12px #cbd3dd, -6px -6px 12px #ffffff;
            outline: none; box-sizing: border-box; transition: all 0.2s ease;
        }
        .input-embos:focus { box-shadow: inset 4px 4px 8px #cbd3dd, inset -4px -4px 8px #ffffff; }
        .tombol-login-embos {
            width: 100%; background: #EAF0F6; border: none; padding: 16px; border-radius: 15px;
            color: #4A5568; font-size: 15px; font-weight: 700; letter-spacing: 0.5px; cursor: pointer;
            box-shadow: 8px 8px 16px #cbd3dd, -8px -8px 16px #ffffff; transition: all 0.2s ease-in-out; margin-top: 15px;
        }
        .tombol-login-embos:active { box-shadow: inset 6px 6px 12px #cbd3dd, inset -6px -6px 12px #ffffff; color: #2D3748; }
        .notif-custom-embos {
            position: absolute; top: -20px; left: 50%; transform: translateX(-50%) scale(0.9); width: 85%;
            background: #EAF0F6; padding: 15px; border-radius: 15px; font-size: 13px; font-weight: 700;
            color: #E53E3E; box-shadow: 6px 6px 15px #cbd3dd, -6px -6px 15px #ffffff; opacity: 0; visibility: hidden;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); z-index: 99;
        }
        .notif-custom-embos.tampil { top: 25px; opacity: 1; visibility: visible; transform: translateX(-50%) scale(1); }
        #halaman-hasil { display: none; }
        .bingkai-foto-embos {
            width: 120px; height: 150px; background: #EAF0F6; margin: 0 auto 25px auto;
            border-radius: 15px; padding: 8px; box-sizing: border-box; box-shadow: 8px 8px 16px #cbd3dd, -8px -8px 16px #ffffff;
        }
        .bingkai-foto-embos img { width: 100%; height: 100%; object-fit: cover; border-radius: 10px; }
        .status-lulus { color: #2F855A; font-size: 22px; font-weight: 800; letter-spacing: 2px; }
        .status-tidak-lulus { color: #C53030; font-size: 22px; font-weight: 800; letter-spacing: 2px; }
        .copyright-embos { font-size: 10px; color: #a0aec0; margin-top: 20px; font-weight: 600; letter-spacing: 0.3px; border-top: 1px dashed #cbd3dd; padding-top: 12px; }
    </style>
</head>
<body>

    <div class="wadah-aplikasi">
        <div id="notifBox" class="notif-custom-embos"></div>

        <!-- ================= HALAMAN LOGIN ================= -->
        <div id="halaman-login">
            <div class="header-aplikasi">
                <div class="logo-toga-embos">🎓</div>
                <h1>SMPN 2 PABUARAN</h1>
                <p>SISTEM KELULUSAN DIGITAL</p>
            </div>
            <div class="grup-input">
                <label for="nisn">NOMOR INDUK SISWA NASIONAL</label>
                <input type="text" id="nisn" class="input-embos" placeholder="Masukkan NISN" autocomplete="off">
            </div>
            <div class="grup-input">
                <label for="nama">NAMA LENGKAP SISWA</label>
                <input type="text" id="nama" class="input-embos" placeholder="Masukkan Nama Lengkap" autocomplete="off">
            </div>
            <button id="btnMasuk" class="tombol-login-embos">MASUK SISTEM</button>
        </div>

        <!-- ================= HALAMAN HASIL ================= -->
        <div id="halaman-hasil">
            <div class="header-aplikasi">
                <h1>HASIL KELULUSAN</h1>
                <p id="resNama" style="margin-top: 15px; color: #2D3748; font-size: 18px; font-weight: 800;">-</p>
                <p style="margin-top: 5px; font-size: 12px;">NISN: <span id="resNisn">-</span></p>
            </div>
            <div class="bingkai-foto-embos">
                <img id="resFoto" src="" alt="Foto Siswa">
            </div>
            <div class="grup-input">
                <div style="margin: 20px 0;">
                    <span id="resStatus">-</span>
                </div>
            </div>
            <button onclick="aksiCetakSkl()" class="tombol-login-embos" style="margin-bottom: 12px; color: #2B6CB0;">CETAK SKL</button>
            <button onclick="aksiKeluar()" class="tombol-login-embos" style="margin-top: 0; color: #E53E3E;">KELUAR</button>
        </div>

        <p id="keterangan-bantuan" style="color: #718096; font-size: 11px; margin-top: 25px; font-weight: 700; line-height: 1.4;">
            Hubungi panitia jika data siswa tidak ditemukan.
        </p>
        <div class="copyright-embos">
            &copy; 2026 SMP Negeri 2 Pabuaran. All Rights Reserved.
        </div>
    </div>

    <script>
        // ====== KODE JAVASCRIPT ANDA MASUK DI SINI ======
        
        const URL_SPREADSHEET = "https://script.google.com/macros/s/AKfycbzWV-_M3OCOUjEGQmsu7e-Se56gTgoZSt1XygcRgg3j2QdCgJooQyyM6ZUuUy-__RAKag/exec";

        let siswaAktif = null;

        document.getElementById("btnMasuk").addEventListener("click", async function() {
            const inputNisn = document.getElementById("nisn").value.trim();
            const inputNama = document.getElementById("nama").value.trim().toLowerCase(); 
            const notif = document.getElementById("notifBox");
            const btn = document.getElementById("btnMasuk");

            if (inputNisn === "" || inputNama === "") {
                tampilkanNotif("⚠️ NISN dan Nama wajib diisi!", 3000);
                return;
            }

            btn.innerText = "MEMPROSES...";
            btn.disabled = true;

            // CARI BLOK KODE INI PADA JAVASCRIPT ANDA:
try {
    // TAMBAHKAN PENGATURAN REDIRECT SEPERTI DI BAWAH INI:
    const respon = await fetch(`${URL_SPREADSHEET}?nisn=${inputNisn}`, {
        method: "GET",
        redirect: "follow" // Pengaturan ini wajib agar browser HP tidak memblokir koneksi
    });
    const data = await respon.json();

                if (data.status === "sukses" && data.siswa.nama.toLowerCase() === inputNama) {
                    siswaAktif = data.siswa;
                    document.getElementById("halaman-login").style.display = "none";
                    notif.classList.remove("tampil");

                    const namaNormal = siswaAktif.nama.replace(/\b\w/g, l => l.toUpperCase());
                    document.getElementById("resNama").innerText = namaNormal;
                    document.getElementById("resNisn").innerText = siswaAktif.nisn;
                    document.getElementById("resFoto").src = siswaAktif.foto || "https://unsplash.com";

                    const statusBox = document.getElementById("resStatus");
                    statusBox.innerText = siswaAktif.status;
                    statusBox.className = (siswaAktif.status === "LULUS") ? "status-lulus" : "status-tidak-lulus";

                    document.getElementById("halaman-hasil").style.display = "block";
                } else {
                    tampilkanNotif("❌ Data tidak ditemukan atau salah!", 4000);
                }
            } catch (error) {
                tampilkanNotif("❌ Gagal terhubung ke database!", 4000);
            } finally {
                btn.innerText = "MASUK SISTEM";
                btn.disabled = false;
            }
        });

        function aksiKeluar() {
            siswaAktif = null; 
            document.getElementById("nisn").value = "";
            document.getElementById("nama").value = "";
            document.getElementById("halaman-hasil").style.display = "none";
            document.getElementById("halaman-login").style.display = "block";
        }

        function aksiCetakSkl() {
            if (siswaAktif && siswaAktif.linkSkl) {
                window.open(siswaAktif.linkSkl, '_blank');
            } else {
                alert("❌ Tautan SKL tidak ditemukan di Google Sheets.");
            }
        }

        // ISI SEBELUMNYA YANG SALAH:
// notif.innerText = text = pesan;

// GANTI MENJADI YANG BENAR INI:
function tampilkanNotif(pesan, durasi) {
    const notif = document.getElementById("notifBox");
    notif.innerText = pesan; // Baris ini sudah diperbaiki
    notif.classList.add("tampil");
    setTimeout(() => { notif.classList.remove("tampil"); }, durasi);
}

    </script>
</body>
</html>
